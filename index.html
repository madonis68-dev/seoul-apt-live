<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap');

    body {
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: rgb(15 23 42);
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    /* ==================== 화이트 모드 ==================== */
    html:not(.dark) body {
      background: #e2e8f0;
    }

    html:not(.dark) .glass {
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(203, 213, 225, 0.85);
    }

    html:not(.dark) .nav-light {
      background: linear-gradient(180deg, rgba(248, 250, 252, 0.96) 0%, rgba(226, 232, 240, 0.93) 100%);
      border-right: 1px solid rgba(203, 213, 225, 0.85);
    }

    html:not(.dark) .main-title {
      background: linear-gradient(to right, #1e2937, #334155, #475569);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    html:not(.dark) .hero-title {
      background: linear-gradient(to bottom right, #1e2937, #475569, #64748b);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ==================== 다크 모드 ==================== */
    html.dark body {
      background: rgb(2 6 23);
      color: rgb(226 232 240);
    }

    html.dark .glass {
      background: rgba(15, 23, 42, 0.85);
      border-color: rgba(148, 163, 184, 0.18);
    }

    html.dark .nav-light {
      background: linear-gradient(180deg, rgba(15, 23, 42, 0.95) 0%, rgba(30, 41, 59, 0.92) 100%);
      border-right: 1px solid rgba(51, 65, 85, 0.7);
    }

    /* 다크모드 헤더 제목 */
    html.dark .main-title {
      background: linear-gradient(to right, #f1f5f9, #e2e8f0, #cbd5e1);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ★★★ 다크모드에서 좋아하셨던 보라색 그라데이션 ★★★ */
    html.dark .hero-title {
      background: linear-gradient(to bottom right, #a5b4fc, #c4b5fd, #e0bbff, #f0abfc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .title-font {
      font-family: 'Space Grotesk', sans-serif;
    }
  </style>
</head>
<body class="min-h-screen pb-12">

  <!-- 헤더 -->
  <header class="glass sticky top-0 z-40 p-6 border-b border-white/30 shadow-xl pl-28">

  <main class="pl-28 pr-8 pt-24 max-w-7xl mx-auto">

    <div id="searchScreen" class="max-w-4xl mx-auto text-center pt-16 pb-24">

             class="search-input w-full pl-20 pr-8 py-9 text-3xl md:text-4xl rounded-3xl border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-800 focus:border-blue-500 shadow-2xl placeholder:text-slate-500 focus:outline-none">
      
      <div id="autocomplete" class="absolute w-full mt-4 bg-white dark:bg-slate-800 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 max-h-[460px] overflow-y-auto hidden z-50 py-2 text-lg"></div>
    </div>

    <!-- 결과 화면 -->
    <div id="searchResult" class="hidden result-card">
      <div class="glass p-10 md:p-14 rounded-3xl">
        <h3 id="aptTitle" class="title-font text-5xl md:text-6xl font-bold bg-gradient-to-r from-blue-700 to-indigo-700 dark:from-white dark:to-blue-300 bg-clip-text text-transparent"></h3>

<!-- 통계 -->
<div class="grid grid-cols-2 lg:grid-cols-4 gap-3 mt-12 max-w-[1480px] mx-auto">
  
  <!-- 평균 실거래가 -->
  <div class="stat-card glass rounded-3xl p-3 text-center min-h-[220px] flex flex-col justify-center">
    <div class="text-5xl mb-4">💰</div>
    <div id="aptAvgPrice" class="text-3xl font-bold text-blue-600 dark:text-blue-400"></div>
    <div class="text-sm font-medium text-slate-600 dark:text-slate-300 mt-3">평균 실거래가</div>
  </div>

  <!-- 최근 거래일 -->
  <div class="stat-card glass rounded-3xl p-3 text-center min-h-[220px] flex flex-col justify-center">

  </div>

  <!-- 총 거래건수 -->
  <div class="stat-card glass rounded-3xl p-3 text-center min-h-[220px] flex flex-col justify-center">

    <div id="aptDealCount" class="text-3xl font-bold text-purple-600 dark:text-purple-400"></div>
    <div class="text-sm font-medium text-slate-600 dark:text-slate-300 mt-3">총 거래건수</div>
  </div>

  <!-- 최고 거래가 -->
  <div class="stat-card glass rounded-3xl p-3 text-center min-h-[220px] flex flex-col justify-center">
    <div class="text-5xl mb-4">🔥</div>
    <div id="aptMaxPrice" class="text-3xl font-bold text-rose-600 dark:text-rose-400"></div>
    <div class="text-sm font-medium text-slate-600 dark:text-slate-300 mt-3">최고 거래가</div>
  </div>
</div>
        <!-- 차트 -->
        <div class="mt-12 bg-white/70 dark:bg-slate-800/70 rounded-3xl p-8">
          <canvas id="detailChart" class="w-full h-[380px]"></canvas>
        </div>

        <!-- 거래 내역 -->
        <div class="mt-14">
          <div class="flex justify-between items-center mb-6">
            <h4 class="title-font text-3xl font-semibold">최근 거래 내역</h4>
            <span id="dealCountBadge" class="px-6 py-2 bg-blue-100 text-blue-700 dark:bg-blue-900/60 dark:text-blue-300 rounded-3xl text-sm font-medium"></span>
          </div>
          
          <div class="overflow-x-auto rounded-3xl border border-slate-200 dark:border-slate-700 bg-white/70 dark:bg-slate-800/70">
            <table class="w-full">
              <thead>
                <tr class="bg-slate-100 dark:bg-slate-800">
                  <th class="px-8 py-5 text-left font-medium text-slate-600">거래일</th>
                  <th class="px-8 py-5 text-left font-medium text-slate-600">면적</th>
                  <th class="px-8 py-5 text-left font-medium text-slate-600">층수</th>
                  <th class="px-8 py-5 text-right font-medium text-slate-600">거래금액</th>
                </tr>
              </thead>
              <tbody id="recentDeals" class="divide-y divide-slate-200 dark:divide-slate-700"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    let aptMap = new Map();           // 아파트명 → 거래 배열
    let currentAptName = "";

    // ===== 고도화된 smartMatch (등촌2 → 등촌1,2단지 / 럭키신촌 → 신촌럭키 완벽 지원) =====
    function getSearchTokens(str) {
      let s = str.toLowerCase();
      // 구분자 → 공백
      s = s.replace(/[,\.\-]/g, ' ');
      // 숫자와 한글/영어 분리
      s = s.replace(/([가-힣a-z]+)([0-9]+)/g, '$1 $2');
      s = s.replace(/([0-9]+)([가-힣a-z]+)/g, '$1 $2');
      // 나머지 특수문자 → 공백
      s = s.replace(/[^가-힣a-z0-9\s]/g, ' ');
      return s.split(/\s+/).filter(Boolean);
    }

    function smartMatch(aptName, keyword) {
      if (!keyword?.trim()) return false;
      
      const cleanName = aptName.toLowerCase().replace(/[^가-힣a-z0-9]/g, '');
      const cleanKeyword = keyword.toLowerCase().replace(/[^가-힣a-z0-9]/g, '');

      // 1. 완전 포함 (가장 빠른 매칭)
      if (cleanName.includes(cleanKeyword)) return true;

      // 2. 토큰 기반 매칭 (숫자, 단지, 콤마 처리)
      const nameTokens = getSearchTokens(aptName);
      const keywordTokens = getSearchTokens(keyword);
      const nameTokenSet = new Set(nameTokens);
      
      if (keywordTokens.length > 0 && keywordTokens.every(t => nameTokenSet.has(t))) {
        return true;
      }

      // 3. 역순/합성어 처리 (럭키신촌 ↔ 신촌럭키, 등촌2 등)
      if (cleanKeyword.length >= 4) {
        for (let i = 2; i < cleanKeyword.length - 1; i++) {
          const part1 = cleanKeyword.slice(0, i);
          const part2 = cleanKeyword.slice(i);
          if (part1.length >= 2 && part2.length >= 2 && 
              cleanName.includes(part1) && cleanName.includes(part2)) {
            return true;
          }
        }
      }

      return false;
    }
    // 데이터 로드 + 동적 사이드바 업데이트
    async function loadData() {
      const res = await fetch('./apartment_data.json');
      const rawData = await res.json();

      aptMap.clear();

      rawData.forEach(item => {
        const name = (item.aptName || '').trim();
        if (!name) return;

        const deal = {
          aptName: name,
          district: item.district || '',
          dealDate: item.dealDate,
          area: parseFloat(item.area) || 0,
          floor: item.floor || '',
          price: parseInt(item.price) || 0
        };

        if (!aptMap.has(name)) aptMap.set(name, []);
        aptMap.get(name).push(deal);
      });

      // ===== 사이드바 정보 동적 업데이트 =====
      updateSidebarInfo(rawData);

      console.log(`✅ ${aptMap.size}개 단지, 총 ${rawData.length}건 로드 완료`);
      setupSearch();
    }

    // 사이드바 (기간 + 총 거래건수) 자동 업데이트
    function updateSidebarInfo(rawData) {
      if (rawData.length === 0) return;

      const dates = rawData.map(item => item.dealDate).sort();
      const minDate = dates[0];
      const maxDate = dates[dates.length - 1];

      const year = minDate.substring(0, 4);
      const minMonth = parseInt(minDate.substring(5, 7));
      const maxMonth = parseInt(maxDate.substring(5, 7));

      const periodText = `${year}년 ${minMonth}~${maxMonth}월`;

      const sidebarEl = document.getElementById('sidebarInfo');
      if (sidebarEl) {
        sidebarEl.innerHTML = `
          ${periodText}<br>
          실거래가 <span class="font-semibold text-emerald-600 dark:text-emerald-400">${rawData.length.toLocaleString()}건</span>
        `;
      }
    }

    // 자동완성 + debounce + 알파벳 정렬
    let debounceTimer;
    function setupSearch() {
      const input = document.getElementById('mainSearch');
      const dropdown = document.getElementById('autocomplete');

      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const keyword = input.value.trim();
          dropdown.classList.add('hidden');
          if (keyword.length < 1) return;

          let matches = [];
          for (const [name] of aptMap) {
            if (smartMatch(name, keyword)) {
              matches.push(name);
            }
          }

          if (matches.length === 0) return;

          // 알파벳 순 정렬 + 거래 많은 순으로 보조 정렬
          matches.sort((a, b) => {
            const lenA = aptMap.get(a).length;
            const lenB = aptMap.get(b).length;
            if (lenA !== lenB) return lenB - lenA;
            return a.localeCompare(b);
          });

          // 최대 14개만 표시
          matches = matches.slice(0, 14);

          dropdown.innerHTML = matches.map(name => {
            const deals = aptMap.get(name);
            const district = deals[0].district || '';
            return `
              <div onclick="selectApt('${name}')" 
                   class="dropdown-item px-7 py-5 hover:bg-blue-50 dark:hover:bg-slate-700 cursor-pointer text-lg border-b last:border-0 flex justify-between items-center">
                <span>${name}</span>
                <span class="text-xs px-3 py-1 bg-blue-100 text-blue-700 dark:bg-blue-900 dark:text-blue-300 rounded-3xl">${district}</span>
              </div>
            `;
          }).join('');
          
          dropdown.classList.remove('hidden');
        }, 120);
      });

      // Enter 키 검색
      input.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          const val = input.value.trim();
          if (val) searchApt(val);
        }
      });

      // 바깥 클릭 시 드롭다운 닫기
      document.addEventListener('click', e => {
        if (!input.contains(e.target) && !dropdown.contains(e.target)) dropdown.classList.add('hidden');
      });
    }

    function selectApt(name) {
      document.getElementById('mainSearch').value = name;
      document.getElementById('autocomplete').classList.add('hidden');
      searchApt(name);
    }

function searchApt(keyword) {
  let deals = [];

  for (const [name, list] of aptMap) {
    if (smartMatch(name, keyword)) {
      deals = deals.concat(list);
    }
  }

  if (deals.length === 0) {
    alert("해당 아파트 거래 내역을 찾을 수 없습니다.😢");
    return;
  }

  currentAptName = deals[0].aptName;
  renderResult(deals);

      currentAptName = deals[0].aptName;
      renderResult(deals);
      document.getElementById('searchResult').classList.remove('hidden');

    }

    function renderResult(data) {
      const titleEl = document.getElementById('aptTitle');
      titleEl.textContent = data[0].aptName;

      // 통계
      let total = 0, maxP = 0;
      data.forEach(d => {
        total += d.price;
        if (d.price > maxP) maxP = d.price;
      });

     const avg = Math.round(total / data.length);
      document.getElementById('aptAvgPrice').textContent = formatPrice(avg);

      // 최근 거래일 → 한국식으로 변경
      const latest = [...data].sort((a,b) => new Date(b.dealDate) - new Date(a.dealDate))[0];
      document.getElementById('aptLatestDate').textContent = formatDateKorean(latest.dealDate);

      document.getElementById('aptDealCount').textContent = data.length + "건";
      document.getElementById('aptMaxPrice').textContent = formatPrice(maxP);
         // 차트 (최근 30건)
      const sorted = [...data].sort((a,b) => new Date(a.dealDate) - new Date(b.dealDate)).slice(-30);
      
      const ctx = document.getElementById('detailChart').getContext('2d');
      if (window.myChart) window.myChart.destroy();

      const isDark = document.documentElement.classList.contains('dark');

      // 가격 범위 계산
      const prices = sorted.map(d => d.price);
      const minPrice = Math.min(...prices);
      const maxPrice = Math.max(...prices);

      const suggestedMin = Math.floor(minPrice * 0.9 / 10000) * 10000;
      const suggestedMax = Math.ceil(maxPrice * 1.1 / 10000) * 10000;

      window.myChart = new Chart(ctx, {
        type: 'line',
        data: {
          labels: sorted.map(d => d.dealDate.slice(5)),
          datasets: [{
            label: '실거래가',
            data: sorted.map(d => d.price),
            borderColor: '#3b82f6',
            backgroundColor: isDark ? 'rgba(59,130,246,0.18)' : 'rgba(59,130,246,0.12)',
            borderWidth: 5,
            tension: 0.4,
            pointRadius: 4,
            pointHoverRadius: 7,
            pointBackgroundColor: isDark ? '#1e2937' : '#ffffff',
            pointBorderColor: '#3b82f6',
            pointBorderWidth: 2.5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          plugins: { 
            legend: { display: false },
            tooltip: {
              backgroundColor: isDark ? 'rgba(15,23,42,0.97)' : 'rgba(255,255,255,0.98)',
              titleColor: isDark ? '#e2e8f0' : '#1e2937',
              bodyColor: isDark ? '#e2e8f0' : '#1e2937',
              bodyFont: { size: 15, weight: '600' },
              callbacks: {
                label: (ctx) => ' ' + formatPrice(ctx.raw)
              }
            }
          },
          scales: {
            y: { 
              min: suggestedMin,
              max: suggestedMax,
              grid: {
                color: isDark ? 'rgba(148,163,184,0.18)' : 'rgba(0,0,0,0.09)',
                lineWidth: 1
              },
              ticks: { 
                font: { size: 15, weight: '600' },
                color: isDark ? '#e2e8f0' : '#0f172a',   // ← 화이트모드에서 완전 검정
                callback: function(value) {
                  if (value >= 100000000) return (value / 100000000) + '억';
                  if (value >= 10000000) return Math.round(value / 10000000) + '천만';
                  return Math.round(value / 10000) + '만';
                }
              }
            },
            x: {
              grid: {
                color: isDark ? 'rgba(148,163,184,0.15)' : 'rgba(0,0,0,0.08)'
              },
              ticks: { 
                font: { size: 13.5, weight: '500' },
                color: isDark ? '#cbd5e1' : '#1e2937',   // ← 화이트모드에서 검정
                maxRotation: 40,
                minRotation: 40
              }
            }
          }
        }
      });
// 테이블 (최근 15건)
      const tbody = document.getElementById('recentDeals');
      const recent = [...data].sort((a,b) => new Date(b.dealDate) - new Date(a.dealDate)).slice(0, 15);
      
      tbody.innerHTML = recent.map(d => `
        <tr class="table-row">
          <td class="px-8 py-6 font-medium">${d.dealDate}</td>
          <td class="px-8 py-6">${d.area.toFixed(1)}㎡</td>
          <td class="px-8 py-6">${d.floor}층</td>
          <td class="px-8 py-6 text-right font-bold text-blue-600">${formatPrice(d.price)}</td>
        </tr>
      `).join('');

      document.getElementById('dealCountBadge').textContent = recent.length + "건 표시";
    }

    function formatPrice(p) {
      const e = Math.floor(p / 10000);
      return e ? `${e}억 ${p % 10000}만` : `${p}만`;
    }
function formatDateKorean(dateStr) {
      const [year, month, day] = dateStr.split('-');
      return `${year.slice(2)}년 ${parseInt(month)}월 ${parseInt(day)}일`;
    }
function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      const icon = document.getElementById('theme-icon');
      icon.textContent = document.documentElement.classList.contains('dark') ? '🌙' : '☀️';

      // 다크모드 토글 후 차트만 업데이트 (스크롤 움직이지 않게)
      if (window.myChart && !document.getElementById('searchResult').classList.contains('hidden')) {
        const currentInput = document.getElementById('mainSearch').value.trim();
        if (currentInput) {
          const deals = Array.from(aptMap.values()).flat().filter(d => d.aptName === currentAptName);
          if (deals.length > 0) {
            renderResult(deals);   // 스크롤 없이 다시 그리기
          }
        }
      }
    }

    function showMain() {
      document.getElementById('searchResult').classList.add('hidden');
      document.getElementById('mainSearch').focus();
      document.getElementById('mainSearch').value = '';
    }

    function showCompare() {
      alert("🚀 단지 비교 기능은 곧 정식 업데이트됩니다!\n\n현재는 실거래 검색에 집중하고 있어요. 감사합니다! 👀");
    }

    // 시작
    window.onload = loadData;
  </script>

</body>
