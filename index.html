<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>서울 아파트 실거래가</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f8fafc;
      --surface: rgba(255,255,255,0.92);
      --surface-strong: #ffffff;
      --border: rgba(148,163,184,0.22);
      --text: #0f172a;
      --muted: #64748b;
      --primary: #2563eb;
      --shadow: 0 10px 30px rgba(15,23,42,0.08);
      --radius: 24px;
    }
    html.dark {
      --bg: #020617;
      --surface: rgba(15,23,42,0.88);
      --surface-strong: #0f172a;
      --border: rgba(148,163,184,0.16);
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #60a5fa;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Noto Sans KR', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }
    .glass { 
      background: var(--surface); 
      backdrop-filter: blur(16px);
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
    }
    .sidebar {
      position: fixed; left: 0; top: 0; bottom: 0; width: 80px;
      padding: 24px 16px; display: none; flex-direction: column; gap: 20px;
      z-index: 50; transition: width 0.3s ease; overflow: hidden;
      border-radius: 0 28px 28px 0;
    }
    .sidebar:hover { width: 280px; }
    .sidebar .label { opacity: 0; transition: opacity 0.2s; }
    .sidebar:hover .label { opacity: 1; }
    .mobile-topbar {
      position: sticky; top: 0; z-index: 40; padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .desktop-header {
      display: none; position: sticky; top: 0; z-index: 40; padding: 24px 32px;
      border-bottom: 1px solid var(--border);
    }
    .content {
      width: min(1400px, 100%); margin: 0 auto; padding: 20px;
      padding-bottom: 140px; padding-left: 20px;
    }
    .hero { text-align: center; padding: 40px 0 20px; }
    .hero h2 {
      font-size: clamp(2.2rem, 7vw, 4.8rem); font-weight: 800;
      line-height: 1.1; margin-bottom: 16px; letter-spacing: -0.02em;
    }
    .hero p { color: var(--muted); font-size: clamp(1.1rem, 3vw, 1.4rem); }
    .search-wrap {
      position: relative; margin: 32px auto; width: min(600px, 100%);
    }
    .search-input {
      width: 100%; height: 68px; border-radius: 24px; border: 1px solid var(--border);
      background: var(--surface-strong); color: var(--text); padding: 0 20px 0 64px;
      font-size: clamp(1.1rem, 4vw, 1.5rem); outline: none; box-shadow: var(--shadow);
    }
    .search-icon { 
      position: absolute; left: 22px; top: 50%; transform: translateY(-50%);
      font-size: 1.6rem; color: var(--primary);
    }
    .autocomplete {
      position: absolute; inset: 0 0 auto 8px; border-radius: 20px;
      max-height: 400px; overflow-y: auto; z-index: 30; background: var(--surface-strong);
    }
    .stats-grid {
      display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; margin: 32px 0;
    }
    .stat-card {
      border-radius: 20px; padding: 24px; text-align: center; min-height: 140px;
      display: flex; flex-direction: column; justify-content: center; gap: 8px;
      background: var(--surface-strong); border: 1px solid var(--border);
    }
    .stat-value {
      font-size: clamp(1.4rem, 4vw, 2.6rem); font-weight: 800; line-height: 1.1;
    }
    .table-wrap { 
      overflow-x: auto; border-radius: 20px; margin-top: 24px; 
      background: var(--surface-strong); border: 1px solid var(--border);
    }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th, td { padding: 16px; text-align: left; font-size: 0.95rem; }
    th { color: var(--muted); background: rgba(148,163,184,0.08); font-weight: 600; }
    td:last-child, th:last-child { text-align: right; }
    tbody tr { border-top: 1px solid var(--border); }
    .chart-container { 
      height: clamp(280px, 40vw, 420px); margin: 28px 0; border-radius: 20px;
      overflow: hidden; background: var(--surface-strong); border: 1px solid var(--border);
    }
    .bottom-nav {
      position: fixed; left: 16px; right: 16px; bottom: 16px; z-index: 60;
      display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 12px;
      background: var(--surface-strong); border-radius: 20px; border: 1px solid var(--border);
    }
    .nav-btn { 
      height: 52px; border: 1px solid var(--border); border-radius: 16px;
      background: transparent; color: inherit; font-size: 1rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .nav-btn.active { 
      background: rgba(37,99,235,0.15); color: var(--primary); 
    }
    @media (min-width: 1024px) {
      .sidebar { display: flex; }
      .mobile-topbar, .bottom-nav { display: none; }
      .desktop-header { display: block; margin-left: 80px; }
      .content { margin-left: 80px; padding: 32px; padding-bottom: 60px; }
      .stats-grid { grid-template-columns: repeat(4, 1fr); gap: 20px; }
      .search-wrap { width: min(800px, 100%); }
    }
  </style>
</head>
<body>
  <!-- 사이드바 (PC) -->
  <nav class="sidebar glass" aria-label="메뉴">
    <div class="flex items-center gap-3 p-3 rounded-2xl hover:bg-white/50">
      <div class="w-12 h-12 rounded-2xl flex items-center justify-center text-2xl text-white font-bold" 
           style="background: linear-gradient(135deg, #2563eb, #1d4ed8);">🏠</div>
      <span class="label font-bold text-2xl tracking-tight">Estate</span>
    </div>
    <button onclick="showMain()" class="nav-btn active flex items-center gap-4 p-4" id="desktopMain">
      <span class="text-2xl">🔍</span><span class="label font-semibold">실거래 검색</span>
    </button>
    <button onclick="showCompare()" class="nav-btn flex items-center gap-4 p-4" id="desktopCompare">
      <span class="text-2xl">⚖️</span><span class="label font-semibold">단지 비교</span>
    </button>
    <div class="mt-auto p-4 text-xs text-center opacity-50" id="sidebarInfo"></div>
  </nav>

  <!-- 모바일 상단바 -->
  <header class="mobile-topbar glass">
    <div class="flex items-center justify-between">
      <div>
        <div class="text-xs opacity-75 mb-1">서울 부동산 실거래</div>
        <h1 class="text-xl font-black tracking-tight">아파트 실거래가</h1>
      </div>
      <button onclick="toggleDarkMode()" class="w-12 h-12 rounded-2xl glass flex items-center justify-center text-2xl" id="mobileTheme">
        ☀️
      </button>
    </div>
  </header>

  <!-- 데스크톱 헤더 -->
  <header class="desktop-header glass">
    <div class="flex items-center justify-between">
      <div class="flex items-center gap-4">
        <h1 class="text-4xl font-black tracking-tight">서울 아파트 실거래가</h1>
        <span class="px-4 py-2 text-sm font-semibold bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 rounded-full">
          LIVE 2026
        </span>
      </div>
      <button onclick="toggleDarkMode()" class="w-14 h-14 rounded-2xl glass flex items-center justify-center text-2xl" id="desktopTheme">
        ☀️
      </button>
    </div>
  </header>

  <main class="content">
    <!-- 히어로 -->
    <section id="searchScreen" class="hero">
      <h2>지금 거래된<br>아파트가 궁금하세요?</h2>
      <p>아파트명을 입력해보세요</p>
    </section>

    <!-- 검색 -->
    <section class="search-wrap glass">
      <div class="search-icon">🔎</div>
      <input id="mainSearch" type="text" class="search-input" 
             placeholder="아파트명 검색 (래미안, 자이, 등촌2, 신촌럭키...)">
      <div id="autocomplete" class="hidden"></div>
    </section>

    <!-- 결과 -->
    <section id="searchResult" class="hidden">
      <div class="glass p-6 rounded-3xl">
        <div class="flex flex-wrap items-center justify-between gap-4 mb-8">
          <div>
            <h3 id="aptTitle" class="text-3xl md:text-5xl font-black tracking-tight" 
                style="background: linear-gradient(135deg, var(--primary), #1d4ed8); -webkit-background-clip: text; background-clip: text;"></h3>
          </div>
          <span id="dealCountBadge" class="px-6 py-2 bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 rounded-full text-sm font-semibold">
          </span>
        </div>

        <div class="stats-grid">
          <div class="stat-card">
            <div class="text-3xl mb-2">💰</div>
            <div id="aptAvgPrice" class="stat-value text-blue-600" style="color: var(--primary);"></div>
            <div class="text-sm opacity-75">평균 실거래가</div>
          </div>
          <div class="stat-card">
            <div class="text-3xl mb-2">📅</div>
            <div id="aptLatestDate" class="stat-value text-emerald-600"></div>
            <div class="text-sm opacity-75">최근 거래일</div>
          </div>
          <div class="stat-card">
            <div class="text-3xl mb-2">📊</div>
            <div id="aptDealCount" class="stat-value text-purple-600"></div>
            <div class="text-sm opacity-75">총 거래건수</div>
          </div>
          <div class="stat-card">
            <div class="text-3xl mb-2">🔥</div>
            <div id="aptMaxPrice" class="stat-value text-rose-600"></div>
            <div class="text-sm opacity-75">최고 거래가</div>
          </div>
        </div>

        <div class="chart-container">
          <canvas id="detailChart"></canvas>
        </div>

        <div class="flex items-center justify-between mb-6">
          <h4 class="text-2xl font-bold">최근 거래 내역</h4>
          <span class="text-sm opacity-75">좌우 스크롤 가능</span>
        </div>
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>거래일</th>
                <th>면적</th>
                <th>층수</th>
                <th>거래금액</th>
              </tr>
            </thead>
            <tbody id="recentDeals"></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <!-- 모바일 하단 네비 -->
  <nav class="bottom-nav glass" aria-label="하단 메뉴">
    <button onclick="showMain()" class="nav-btn active" id="mobileMain">🔍 실거래 검색</button>
    <button onclick="showCompare()" class="nav-btn" id="mobileCompare">⚖️ 단지 비교</button>
  </nav>

  <script>
    let aptMap = new Map();
    let currentAptName = "";
    let myChart = null;
    let debounceTimer;

    // 원본 스크립트 그대로 유지 (최적화만)
    function getSearchTokens(str) {
      let s = str.toLowerCase();
      s = s.replace(/[,.\-]/g, ' ');
      s = s.replace(/([가-힣a-z]+)([0-9]+)/g, '$1 $2');
      s = s.replace(/([0-9]+)([가-힣a-z]+)/g, '$1 $2');
      s = s.replace(/[^가-힣a-z0-9\s]/g, ' ');
      return s.split(/\s+/).filter(Boolean);
    }

    function smartMatch(aptName, keyword) {
      if (!keyword?.trim()) return false;
      const cleanName = aptName.toLowerCase().replace(/[^가-힣a-z0-9]/g, '');
      const cleanKeyword = keyword.toLowerCase().replace(/[^가-힣a-z0-9]/g, '');
      if (cleanName.includes(cleanKeyword)) return true;
      const nameTokens = getSearchTokens(aptName);
      const keywordTokens = getSearchTokens(keyword);
      return keywordTokens.every(t => nameTokens.includes(t));
    }

    function formatPrice(p) {
      const e = Math.floor(p / 10000);
      return e ? `${e}억 ${Math.round(p % 10000 / 10000 * 100)}만` : `${p}만`;
    }

    function formatDateKorean(dateStr) {
      const [year, month, day] = dateStr.split('-');
      return `${year.slice(2)}년 ${parseInt(month)}월 ${parseInt(day)}일`;
    }

    async function loadData() {
      try {
        const res = await fetch('./apartment_data.json');
        const rawData = await res.json();
        aptMap.clear();
        rawData.forEach(item => {
          const name = (item.aptName || '').trim();
          if (!name) return;
          const deal = {
            aptName: name, district: item.district || '',
            dealDate: item.dealDate, area: parseFloat(item.area) || 0,
            floor: item.floor || '', price: parseInt(item.price) || 0
          };
          if (!aptMap.has(name)) aptMap.set(name, []);
          aptMap.get(name).push(deal);
        });
        updateSidebarInfo(rawData);
        setupSearch();
      } catch (e) {
        console.error('데이터 로드 실패:', e);
      }
    }

    function updateSidebarInfo(rawData) {
      const info = document.getElementById('sidebarInfo');
      if (!rawData?.length || !info) return;
      const dates = rawData.map(item => item.dealDate).sort();
      const periodText = `${dates[0].substring(0,4)}년 ${parseInt(dates[0].substring(5,7))}~${parseInt(dates[dates.length-1].substring(5,7))}월`;
      info.innerHTML = `${periodText}<br><strong>${rawData.length.toLocaleString()}건</strong>`;
    }

    function setupSearch() {
      const input = document.getElementById('mainSearch');
      const dropdown = document.getElementById('autocomplete');

      input.addEventListener('input', () => {
        clearTimeout(debounceTimer);
        debounceTimer = setTimeout(() => {
          const keyword = input.value.trim();
          dropdown.classList.add('hidden');
          if (keyword.length < 1) return;

          let matches = [];
          for (const [name] of aptMap) {
            if (smartMatch(name, keyword)) matches.push(name);
          }
          if (matches.length === 0) return;

          matches.sort((a, b) => {
            const lenA = aptMap.get(a).length;
            const lenB = aptMap.get(b).length;
            return lenB - lenA || a.localeCompare(b);
          }).slice(0, 14);

          dropdown.innerHTML = matches.map(name => {
            const deals = aptMap.get(name);
            const district = deals[0]?.district || '';
            return `
              <div onclick="selectApt('${name.replace(/'/g, "\\'")}')" 
                   class="p-5 hover:bg-[rgba(37,99,235,0.08)] dark:hover:bg-slate-800 cursor-pointer border-b border-slate-100 last:border-b-0 flex justify-between items-center text-lg">
                <span>${name}</span>
                <span class="text-xs px-3 py-1 bg-blue-100 text-blue-700 dark:bg-blue-900/50 dark:text-blue-300 rounded-full">${district}</span>
              </div>
            `;
          }).join('');
          dropdown.classList.remove('hidden');
        }, 150);
      });

      input.addEventListener('keypress', e => {
        if (e.key === 'Enter') {
          const val = input.value.trim();
          if (val) searchApt(val);
        }
      });

      document.addEventListener('click', e => {
        if (!input.contains(e.target) && !dropdown.contains(e.target)) {
          dropdown.classList.add('hidden');
        }
      });
    }

    function selectApt(name) {
      document.getElementById('mainSearch').value = name;
      document.getElementById('autocomplete').classList.add('hidden');
      searchApt(name);
    }

    function searchApt(keyword) {
      let deals = [];
      for (const [name, list] of aptMap) {
        if (smartMatch(name, keyword)) deals = deals.concat(list);
      }
      if (deals.length === 0) {
        alert("해당 아파트 거래 내역을 찾을 수 없습니다.😢");
        return;
      }
      currentAptName = deals[0].aptName;
      renderResult(deals);
      document.getElementById('searchResult').classList.remove('hidden');
      document.getElementById('searchScreen').classList.add('hidden');
    }

    function renderResult(data) {
      const titleEl = document.getElementById('aptTitle');
      titleEl.textContent = data[0].aptName;

      let total = 0, maxP = 0;
      data.forEach(d => { total += d.price; if (d.price > maxP) maxP = d.price; });
      const avg = Math.round(total / data.length);

      document.getElementById('aptAvgPrice').textContent = formatPrice(avg);
      const latest = [...data].sort((a,b) => new Date(b.dealDate) - new Date(a.dealDate))[0];
      document.getElementById('aptLatestDate').textContent = formatDateKorean(latest.dealDate);
      document.getElementById('aptDealCount').textContent = data.length.toLocaleString() + "건";
      document.getElementById('aptMaxPrice').textContent = formatPrice(maxP);
      document.getElementById('dealCountBadge').textContent = `총 ${data.length.toLocaleString()}건`;

      // 차트
      const sorted = [...data].sort((a,b) => new Date(a.dealDate) - new Date(b.dealDate)).slice(-30);
      const ctx = document.getElementById('detailChart').getContext('2d');
      if (myChart) myChart.destroy();

      const isDark = document.documentElement.classList.contains('dark');
      const prices = sorted.map(d => d.price);
      const minPrice = Math.min(...prices), maxPrice = Math.max(...prices);
      const suggestedMin = Math.floor(minPrice * 0.9 / 10000) * 10000;
      const suggestedMax = Math.ceil(maxPrice * 1.1 / 10000) * 10000;

      myChart = new Chart(ctx, {
        type: 'line', data: {
          labels: sorted.map(d => d.dealDate.slice(5)),
          datasets: [{
            data: sorted.map(d => d.price),
            borderColor: isDark ? '#60a5fa' : '#2563eb',
            backgroundColor: isDark ? 'rgba(96,165,250,0.18)' : 'rgba(37,99,235,0.12)',
            borderWidth: 4, tension: 0.4, pointRadius: 4,
            pointHoverRadius: 6, fill: true,
            pointBackgroundColor: isDark ? '#0f172a' : '#ffffff',
            pointBorderColor: isDark ? '#60a5fa' : '#2563eb',
            pointBorderWidth: 2
          }]
        }, options: {
          responsive: true, maintainAspectRatio: false,
          plugins: { 
            legend: { display: false },
            tooltip: {
              backgroundColor: isDark ? 'rgba(15,23,42,0.95)' : 'rgba(255,255,255,0.98)',
              titleColor: var(--text), bodyColor: var(--text),
              bodyFont: { size: 14, weight: '600' },
              callbacks: { label: ctx => ' ' + formatPrice(ctx.raw) }
            }
          },
          scales: {
            y: {
              min: suggestedMin, max: suggestedMax,
              grid: { color: isDark ? 'rgba(148,163,184,0.15)' : 'rgba(0,0,0,0.06)' },
              ticks: {
                color: isDark ? '#94a3b8' : '#64748b',
                callback: v => {
                  if (v >= 1e8) return (v/1e8)+'억';
                  if (v >= 1e7) return Math.round(v/1e7)+'천만';
                  return Math.round(v/1e4)+'만';
                }
              }
            },
            x: {
              grid: { color: isDark ? 'rgba(148,163,184,0.12)' : 'rgba(0,0,0,0.05)' },
              ticks: { color: isDark ? '#94a3b8' : '#64748b', maxRotation: 45 }
            }
          }
        }
      });

      // 테이블
      const recent = [...data].sort((a,b) => new Date(b.dealDate) - new Date(a.dealDate)).slice(0, 15);
      document.getElementById('recentDeals').innerHTML = recent.map(d => `
        <tr>
          <td class="font-medium">${d.dealDate}</td>
          <td>${d.area.toFixed(1)}㎡</td>
          <td>${d.floor}층</td>
          <td class="font-bold text-blue-600 dark:text-blue-400">${formatPrice(d.price)}</td>
        </tr>
      `).join('');
    }

    function toggleDarkMode() {
      document.documentElement.classList.toggle('dark');
      const isDark = document.documentElement.classList.contains('dark');
      document.getElementById('desktopTheme').textContent = isDark ? '🌙' : '☀️';
      document.getElementById('mobileTheme').textContent = isDark ? '🌙' : '☀️';
      if (myChart && !document.getElementById('searchResult').classList.contains('hidden')) {
        const deals = Array.from(aptMap.values()).flat().filter(d => d.aptName === currentAptName);
        if (deals.length) renderResult(deals);
      }
    }

    function setActiveNav(mode) {
      ['desktopMain','desktopCompare','mobileMain','mobileCompare'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.classList.toggle('active', id.includes(mode));
      });
    }

    function showMain() {
      document.getElementById('searchScreen').classList.remove('hidden');
      document.getElementById('searchResult').classList.add('hidden');
      document.getElementById('mainSearch').focus();
      document.getElementById('mainSearch').value = '';
      if (myChart) myChart.destroy();
      setActiveNav('Main');
    }

    function showCompare() {
      alert("🚀 단지 비교 기능은 곧 업데이트됩니다!\n\n현재 실거래 검색에 집중하고 있어요. 감사합니다! 👀");
      setActiveNav('Compare');
    }

    // 초기화
    if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.classList.add('dark');
    }
    window.addEventListener('load', loadData);
  </script>
</body>
</html>
